name: "Terraform Deploy"

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  id-token: write # Required for AWS OIDC authentication.
  contents: read

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create Backend Infrastructure
        run: |
          export BUCKET_NAME="k8s-terraform-mcp-state-$(aws sts get-caller-identity --query "Account" --output text)"
          export REGION="eu-central-1"

          # 1. Create S3 Bucket
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Creating bucket $BUCKET_NAME..."
            aws s3api create-bucket --bucket $BUCKET_NAME --region $REGION --create-bucket-configuration LocationConstraint=$REGION
          else
            echo "Bucket $BUCKET_NAME already exists."
          fi

          # 2. Enable Versioning (Crucial for recovering state if corrupted)
          aws s3api put-bucket-versioning --bucket $BUCKET_NAME --versioning-configuration Status=Enabled

          # 3. Create DynamoDB Table for Locking
          if ! aws dynamodb describe-table --table-name terraform-locks --region "$REGION" >/dev/null 2>&1; then
            echo "Creating DynamoDB table terraform-locks..."
            aws dynamodb create-table \
                --table-name terraform-locks \
                --attribute-definitions AttributeName=LockID,AttributeType=S \
                --key-schema AttributeName=LockID,KeyType=HASH \
                --provisioned-throughput ReadCapacityUnits=1,WriteCapacityUnits=1 \
                --region $REGION
          else
            echo "DynamoDB table terraform-locks already exists."
          fi

      - name: Terraform Init
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
          terraform init -backend-config="bucket=k8s-terraform-mcp-state-${ACCOUNT_ID}"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
