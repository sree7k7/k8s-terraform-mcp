apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r", "t"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      
      # FIX 1: expireAfter was moved here in v1
      expireAfter: 720h 
      
  limits:
    cpu: 1000
  disruption:
    # FIX 2: Updated to the new v1 policies
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  role: "KarpenterNodeRole-edge-cluster"
  
  # FIX 3: amiSelectorTerms is now strictly required in v1
  amiSelectorTerms:
    - alias: al2023@latest
    
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "edge-cluster"
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/edge-cluster: "owned"